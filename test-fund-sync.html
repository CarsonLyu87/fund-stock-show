<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金同步功能测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        .test-result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            background: #fff;
            border: 1px solid #eee;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .loading { color: #007bff; }
        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online { background: #28a745; }
        .status-offline { background: #dc3545; }
        .status-warning { background: #ffc107; }
        .fund-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }
        .fund-item {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
        }
        .fund-code {
            font-weight: bold;
            color: #007bff;
        }
        .fund-name {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <h1>基金同步功能测试</h1>
    <p>测试基金添加后监控列表是否实时更新。</p>
    
    <div class="test-section">
        <h2>当前状态</h2>
        <div id="current-status">
            <p><span class="status-indicator status-online"></span> 代理服务器: <span id="proxy-status">检查中...</span></p>
            <p><span class="status-indicator status-warning"></span> 前端服务器: <span id="frontend-status">检查中...</span></p>
            <p><span class="status-indicator"></span> 关注基金数: <span id="fund-count">加载中...</span></p>
        </div>
    </div>
    
    <div class="test-section">
        <h2>测试1: 添加基金到关注列表</h2>
        <p>测试基金代码: 
            <select id="test-fund-select">
                <option value="159941">159941 - 广发纳斯达克100ETF</option>
                <option value="005827">005827 - 易方达蓝筹精选混合</option>
                <option value="161725">161725 - 招商中证白酒指数</option>
                <option value="003095">003095 - 中欧医疗健康混合</option>
                <option value="000001">000001 - 华夏成长混合</option>
            </select>
            <button onclick="testAddFund()">添加基金</button>
        </p>
        <div id="add-fund-result" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试2: 验证监控列表更新</h2>
        <p>检查添加的基金是否出现在监控列表中。</p>
        <button onclick="testMonitorList()">检查监控列表</button>
        <div id="monitor-list-result" class="test-result"></div>
        <div id="fund-list-display" class="fund-list"></div>
    </div>
    
    <div class="test-section">
        <h2>测试3: 完整同步流程测试</h2>
        <p>模拟用户完整操作：搜索 → 添加 → 验证 → 移除</p>
        <button onclick="testFullSyncFlow()">测试完整流程</button>
        <div id="full-sync-result" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试4: 清理测试数据</h2>
        <p>清理所有测试数据，恢复初始状态。</p>
        <button onclick="cleanupTestData()" style="background: #dc3545;">清理测试数据</button>
        <div id="cleanup-result" class="test-result"></div>
    </div>
    
    <script>
        const PROXY_URL = 'http://localhost:3001'
        const FRONTEND_URL = 'http://localhost:3000'
        
        // 状态管理
        let testFunds = []
        
        function logResult(elementId, message, className = '') {
            const element = document.getElementById(elementId)
            const timestamp = new Date().toLocaleTimeString()
            element.innerHTML = `<span class="${className}">[${timestamp}] ${message}</span><br>${element.innerHTML}`
        }
        
        function clearResult(elementId) {
            document.getElementById(elementId).innerHTML = ''
        }
        
        function updateStatus() {
            // 检查代理服务器
            fetch(`${PROXY_URL}/health`)
                .then(response => response.ok ? 
                    document.getElementById('proxy-status').innerHTML = '<span style="color:#28a745">在线</span>' :
                    document.getElementById('proxy-status').innerHTML = '<span style="color:#dc3545">离线</span>'
                )
                .catch(() => {
                    document.getElementById('proxy-status').innerHTML = '<span style="color:#dc3545">离线</span>'
                })
            
            // 检查前端服务器
            fetch(FRONTEND_URL)
                .then(response => response.ok ?
                    document.getElementById('frontend-status').innerHTML = '<span style="color:#28a745">在线</span>' :
                    document.getElementById('frontend-status').innerHTML = '<span style="color:#dc3545">离线</span>'
                )
                .catch(() => {
                    document.getElementById('frontend-status').innerHTML = '<span style="color:#dc3545">离线</span>'
                })
            
            // 更新基金数量
            const userFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
            document.getElementById('fund-count').textContent = userFunds.length
            displayFundList(userFunds)
        }
        
        function displayFundList(funds) {
            const container = document.getElementById('fund-list-display')
            if (funds.length === 0) {
                container.innerHTML = '<div class="fund-item" style="text-align:center;color:#666;">暂无关注的基金</div>'
                return
            }
            
            container.innerHTML = funds.map(fund => `
                <div class="fund-item">
                    <div class="fund-code">${fund.code}</div>
                    <div class="fund-name">${fund.name || '未知基金'}</div>
                    <div style="font-size:11px;color:#999;">添加时间: ${new Date(fund.addedAt).toLocaleTimeString()}</div>
                </div>
            `).join('')
        }
        
        async function testAddFund() {
            const select = document.getElementById('test-fund-select')
            const fundCode = select.value
            const fundName = select.options[select.selectedIndex].text.split(' - ')[1]
            
            clearResult('add-fund-result')
            logResult('add-fund-result', `正在添加基金 ${fundCode} - ${fundName}...`, 'loading')
            
            try {
                // 1. 获取基金详情
                const detailResponse = await fetch(`${PROXY_URL}/api/fund/detail/${fundCode}`)
                const detailData = await detailResponse.json()
                
                if (!detailData.success) {
                    logResult('add-fund-result', `❌ 获取基金详情失败: ${detailData.error}`, 'error')
                    return
                }
                
                logResult('add-fund-result', `✅ 获取基金详情成功: ${detailData.data.name}`, 'success')
                
                // 2. 添加到关注列表
                const userFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
                const exists = userFunds.some(fund => fund.code === fundCode)
                
                if (exists) {
                    logResult('add-fund-result', `⚠️ 基金已在关注列表中`, 'success')
                } else {
                    const newFund = {
                        code: fundCode,
                        name: detailData.data.name,
                        addedAt: new Date().toISOString()
                    }
                    userFunds.push(newFund)
                    localStorage.setItem('fund_stock_show_user_funds', JSON.stringify(userFunds))
                    logResult('add-fund-result', `✅ 成功添加到关注列表`, 'success')
                    
                    // 记录测试基金
                    testFunds.push(fundCode)
                }
                
                // 3. 更新状态
                updateStatus()
                
                // 4. 模拟触发数据重新加载
                logResult('add-fund-result', `🔄 触发数据重新加载...`, 'loading')
                setTimeout(() => {
                    logResult('add-fund-result', `✅ 数据重新加载已触发`, 'success')
                }, 1000)
                
            } catch (error) {
                logResult('add-fund-result', `❌ 添加基金失败: ${error.message}`, 'error')
            }
        }
        
        async function testMonitorList() {
            clearResult('monitor-list-result')
            logResult('monitor-list-result', '检查监控列表...', 'loading')
            
            try {
                // 获取当前关注列表
                const userFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
                
                if (userFunds.length === 0) {
                    logResult('monitor-list-result', '⚠️ 关注列表为空', 'success')
                    return
                }
                
                logResult('monitor-list-result', `✅ 关注列表中有 ${userFunds.length} 只基金`, 'success')
                
                // 检查每只基金是否在监控列表中
                for (const fund of userFunds) {
                    logResult('monitor-list-result', `📊 ${fund.code} - ${fund.name}`, 'success')
                }
                
                // 显示基金列表
                displayFundList(userFunds)
                
            } catch (error) {
                logResult('monitor-list-result', `❌ 检查监控列表失败: ${error.message}`, 'error')
            }
        }
        
        async function testFullSyncFlow() {
            clearResult('full-sync-result')
            logResult('full-sync-result', '开始完整同步流程测试...', 'loading')
            
            const testCode = '000001' // 华夏成长混合
            
            try {
                // 步骤1: 搜索基金
                logResult('full-sync-result', '1. 搜索基金...', 'loading')
                const searchResponse = await fetch(`${PROXY_URL}/api/fund/detail/${testCode}`)
                const searchData = await searchResponse.json()
                
                if (!searchData.success) {
                    logResult('full-sync-result', `❌ 搜索失败: ${searchData.error}`, 'error')
                    return
                }
                
                logResult('full-sync-result', `✅ 搜索成功: ${searchData.data.name}`, 'success')
                
                // 步骤2: 添加到关注列表
                logResult('full-sync-result', '2. 添加到关注列表...', 'loading')
                const userFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
                const exists = userFunds.some(fund => fund.code === testCode)
                
                if (!exists) {
                    userFunds.push({
                        code: testCode,
                        name: searchData.data.name,
                        addedAt: new Date().toISOString()
                    })
                    localStorage.setItem('fund_stock_show_user_funds', JSON.stringify(userFunds))
                    logResult('full-sync-result', `✅ 添加成功`, 'success')
                } else {
                    logResult('full-sync-result', `⚠️ 基金已在列表中`, 'success')
                }
                
                // 步骤3: 验证监控列表
                logResult('full-sync-result', '3. 验证监控列表...', 'loading')
                const updatedFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
                const found = updatedFunds.some(fund => fund.code === testCode)
                
                if (found) {
                    logResult('full-sync-result', `✅ 基金出现在监控列表中`, 'success')
                } else {
                    logResult('full-sync-result', `❌ 基金未出现在监控列表中`, 'error')
                }
                
                // 步骤4: 从监控列表移除
                logResult('full-sync-result', '4. 从监控列表移除...', 'loading')
                const filteredFunds = updatedFunds.filter(fund => fund.code !== testCode)
                localStorage.setItem('fund_stock_show_user_funds', JSON.stringify(filteredFunds))
                logResult('full-sync-result', `✅ 移除成功`, 'success')
                
                // 步骤5: 最终验证
                logResult('full-sync-result', '5. 最终验证...', 'loading')
                const finalFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
                const stillExists = finalFunds.some(fund => fund.code === testCode)
                
                if (!stillExists) {
                    logResult('full-sync-result', `✅ 同步流程测试完成，所有步骤成功`, 'success')
                } else {
                    logResult('full-sync-result', `❌ 基金未被正确移除`, 'error')
                }
                
                // 更新状态
                updateStatus()
                
            } catch (error) {
                logResult('full-sync-result', `❌ 同步流程测试失败: ${error.message}`, 'error')
            }
        }
        
        function cleanupTestData() {
            clearResult('cleanup-result')
            logResult('cleanup-result', '清理测试数据...', 'loading')
            
            try {
                // 清理所有测试基金
                const userFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
                const originalFunds = userFunds.filter(fund => !testFunds.includes(fund.code))
                
                localStorage.setItem('fund_stock_show_user_funds', JSON.stringify(originalFunds))
                testFunds = []
                
                logResult('cleanup-result', `✅ 测试数据清理完成`, 'success')
                logResult('cleanup-result', `剩余基金: ${originalFunds.length} 只`, 'success')
                
                // 更新状态
                updateStatus()
                
            } catch (error) {
                logResult('cleanup-result', `❌ 清理失败: ${error.message}`, 'error')
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('load', () => {
            // 初始状态检查
            updateStatus()
            
            // 定期更新状态
            setInterval(updateStatus, 5000)
        })
    </script>
</body>
</html>
