<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金数据测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .success {
            color: #52c41a;
        }
        .error {
            color: #ff4d4f;
        }
        .loading {
            color: #1890ff;
        }
        button {
            padding: 8px 16px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #40a9ff;
        }
        pre {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 4px;
            overflow: auto;
            max-height: 300px;
        }
    </style>
</head>
<body>
    <h1>基金数据获取测试</h1>
    
    <div class="test-section">
        <h2>1. 测试天天基金API</h2>
        <button onclick="testTiantianAPI()">测试天天基金API</button>
        <div id="tiantian-result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 测试东方财富API</h2>
        <button onclick="testEastmoneyAPI()">测试东方财富API</button>
        <div id="eastmoney-result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 测试新浪财经API</h2>
        <button onclick="testSinaAPI()">测试新浪财经API</button>
        <div id="sina-result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 测试完整数据获取</h2>
        <button onclick="testFullData()">测试完整数据获取</button>
        <div id="full-result"></div>
    </div>
    
    <div class="test-section">
        <h2>控制台输出</h2>
        <pre id="console-output"></pre>
    </div>

    <script>
        const consoleOutput = document.getElementById('console-output');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const line = `[${timestamp}] ${message}`;
            consoleOutput.textContent += line + '\n';
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
            
            if (type === 'error') {
                console.error(message);
            } else {
                console.log(message);
            }
        }
        
        async function testTiantianAPI() {
            const resultDiv = document.getElementById('tiantian-result');
            resultDiv.innerHTML = '<span class="loading">测试中...</span>';
            
            try {
                const response = await fetch('https://fundgz.1234567.com.cn/js/005827.js?rt=' + Date.now(), {
                    headers: {
                        'Referer': 'https://fund.eastmoney.com/'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const text = await response.text();
                log(`天天基金API响应: ${response.status} ${response.statusText}`);
                log(`响应长度: ${text.length} 字符`);
                
                // 解析JSONP
                const jsonStr = text.replace(/^jsonpgz\(/, '').replace(/\);$/, '');
                const data = JSON.parse(jsonStr);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        ✅ 测试成功<br>
                        基金: ${data.name} (${data.fundcode})<br>
                        单位净值: ${data.dwjz}<br>
                        估算净值: ${data.gsz} (${data.gszzl}%)<br>
                        净值日期: ${data.jzrq}
                    </div>
                `;
                
            } catch (error) {
                log(`天天基金API错误: ${error.message}`, 'error');
                resultDiv.innerHTML = `<div class="error">❌ 测试失败: ${error.message}</div>`;
            }
        }
        
        async function testEastmoneyAPI() {
            const resultDiv = document.getElementById('eastmoney-result');
            resultDiv.innerHTML = '<span class="loading">测试中...</span>';
            
            try {
                const response = await fetch('https://api.fund.eastmoney.com/f10/lsjz?fundCode=005827&pageIndex=1&pageSize=1', {
                    headers: {
                        'Referer': 'https://fund.eastmoney.com/',
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                log(`东方财富API响应: ${response.status} ${response.statusText}`);
                log(`ErrCode: ${data.ErrCode}, ErrMsg: ${data.ErrMsg}`);
                
                if (data.ErrCode === 0 && data.Data && data.Data.LSJZList && data.Data.LSJZList.length > 0) {
                    const fundData = data.Data.LSJZList[0];
                    resultDiv.innerHTML = `
                        <div class="success">
                            ✅ 测试成功<br>
                            净值日期: ${fundData.FSRQ}<br>
                            单位净值: ${fundData.DWJZ}<br>
                            累计净值: ${fundData.LJJZ}<br>
                            涨跌幅: ${fundData.JZZZL}%
                        </div>
                    `;
                } else {
                    throw new Error('无净值数据或数据格式错误');
                }
                
            } catch (error) {
                log(`东方财富API错误: ${error.message}`, 'error');
                resultDiv.innerHTML = `<div class="error">❌ 测试失败: ${error.message}</div>`;
            }
        }
        
        async function testSinaAPI() {
            const resultDiv = document.getElementById('sina-result');
            resultDiv.innerHTML = '<span class="loading">测试中...</span>';
            
            try {
                const response = await fetch('https://hq.sinajs.cn/list=sh600519,sz000858', {
                    headers: {
                        'Referer': 'https://finance.sina.com.cn/'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const text = await response.text();
                log(`新浪财经API响应: ${response.status} ${response.statusText}`);
                log(`响应长度: ${text.length} 字符`);
                
                // 简单解析
                const lines = text.split(';').filter(line => line.trim());
                const stocks = [];
                
                lines.forEach(line => {
                    const match = line.match(/var hq_str_(.+?)="(.+)"/);
                    if (match) {
                        const values = match[2].split(',');
                        if (values.length >= 3) {
                            stocks.push({
                                symbol: match[1],
                                name: values[0],
                                price: values[3]
                            });
                        }
                    }
                });
                
                if (stocks.length > 0) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            ✅ 测试成功<br>
                            获取到 ${stocks.length} 只股票数据<br>
                            ${stocks.map(s => `${s.name}: ${s.price}`).join('<br>')}
                        </div>
                    `;
                } else {
                    throw new Error('无法解析股票数据');
                }
                
            } catch (error) {
                log(`新浪财经API错误: ${error.message}`, 'error');
                resultDiv.innerHTML = `<div class="error">❌ 测试失败: ${error.message}</div>`;
            }
        }
        
        async function testFullData() {
            const resultDiv = document.getElementById('full-result');
            resultDiv.innerHTML = '<span class="loading">测试中...</span>';
            
            try {
                // 测试应用的数据获取
                const response = await fetch('/api/funds');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                log(`完整数据获取响应: ${response.status} ${response.statusText}`);
                
                if (data.success && data.data && data.data.length > 0) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            ✅ 测试成功<br>
                            获取到 ${data.data.length} 只基金数据<br>
                            第一只基金: ${data.data[0].name} (${data.data[0].currentPrice})
                        </div>
                        <pre>${JSON.stringify(data.data.slice(0, 2), null, 2)}</pre>
                    `;
                } else {
                    throw new Error('数据格式错误或为空');
                }
                
            } catch (error) {
                log(`完整数据获取错误: ${error.message}`, 'error');
                
                // 尝试直接调用本地API
                try {
                    log('尝试直接调用数据获取函数...');
                    // 这里可以添加直接调用JavaScript函数的代码
                    resultDiv.innerHTML = `<div class="error">❌ API测试失败，但可能只是API路由不存在</div>`;
                } catch (innerError) {
                    resultDiv.innerHTML = `<div class="error">❌ 测试失败: ${error.message}</div>`;
                }
            }
        }
        
        // 初始化日志
        log('测试页面已加载，点击按钮开始测试');
    </script>
</body>
</html>
