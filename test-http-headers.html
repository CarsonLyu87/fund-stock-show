<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP头修复测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        button {
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .log {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>HTTP头修复测试</h1>
    <p>测试基金项目中的HTTP头修复是否解决了"Refused to set unsafe header"问题。</p>
    
    <div class="test-section">
        <h2>测试1: 检查浏览器环境检测</h2>
        <button onclick="testEnvironmentDetection()">运行测试</button>
        <div id="env-test-result"></div>
        <div id="env-test-log" class="log"></div>
    </div>
    
    <div class="test-section">
        <h2>测试2: 测试基金API调用</h2>
        <button onclick="testFundApi()">测试基金API (005827)</button>
        <div id="fund-test-result"></div>
        <div id="fund-test-log" class="log"></div>
    </div>
    
    <div class="test-section">
        <h2>测试3: 测试股票API调用</h2>
        <button onclick="testStockApi()">测试股票API (sh600519)</button>
        <div id="stock-test-result"></div>
        <div id="stock-test-log" class="log"></div>
    </div>
    
    <div class="test-section">
        <h2>测试4: 检查控制台错误</h2>
        <p>打开浏览器开发者工具的控制台，查看是否有"Refused to set unsafe header"错误。</p>
        <button onclick="checkConsoleErrors()">检查控制台</button>
        <div id="console-test-result"></div>
    </div>

    <script>
        let logs = {};
        
        function log(section, message) {
            const logDiv = document.getElementById(`${section}-test-log`);
            if (logDiv) {
                logDiv.textContent += message + '\n';
                logDiv.scrollTop = logDiv.scrollHeight;
            }
            console.log(`[${section}]`, message);
        }
        
        function setResult(section, message, isSuccess) {
            const resultDiv = document.getElementById(`${section}-test-result`);
            if (resultDiv) {
                resultDiv.innerHTML = `<span class="${isSuccess ? 'success' : 'error'}">${message}</span>`;
            }
        }
        
        function testEnvironmentDetection() {
            const section = 'env';
            logs[section] = [];
            document.getElementById(`${section}-test-log`).textContent = '';
            
            log(section, '开始测试环境检测...');
            
            // 测试isBrowser检测
            const isBrowser = typeof window !== 'undefined';
            log(section, `isBrowser检测结果: ${isBrowser}`);
            
            // 测试HTTP头安全检测
            const unsafeHeaders = ['User-Agent', 'Accept-Encoding', 'Connection', 'Referer', 'Content-Length', 'Host', 'Origin'];
            log(section, '不安全的HTTP头列表: ' + unsafeHeaders.join(', '));
            
            // 测试当前环境可以设置的HTTP头
            const testHeaders = {
                'Accept': 'application/json',
                'Accept-Language': 'zh-CN',
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
            };
            
            log(section, '浏览器环境中安全的HTTP头: ' + Object.keys(testHeaders).join(', '));
            
            setResult(section, '环境检测完成', true);
        }
        
        async function testFundApi() {
            const section = 'fund';
            logs[section] = [];
            document.getElementById(`${section}-test-log`).textContent = '';
            
            log(section, '开始测试基金API...');
            
            try {
                // 测试天天基金API
                const fundCode = '005827';
                const url = `https://fundgz.1234567.com.cn/js/${fundCode}.js?rt=${Date.now()}`;
                
                log(section, `请求URL: ${url}`);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json, text/plain, */*',
                        'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (response.ok) {
                    const text = await response.text();
                    log(section, 'API响应成功');
                    log(section, '响应长度: ' + text.length + ' 字符');
                    
                    // 尝试解析JSONP
                    if (text.startsWith('jsonpgz(')) {
                        const jsonStr = text.replace(/^jsonpgz\(/, '').replace(/\);$/, '');
                        try {
                            const data = JSON.parse(jsonStr);
                            log(section, '解析成功: ' + data.name + ' - ' + data.gsz);
                            setResult(section, '基金API测试成功', true);
                        } catch (e) {
                            log(section, 'JSON解析失败: ' + e.message);
                            setResult(section, '基金API响应格式错误', false);
                        }
                    } else {
                        log(section, '响应不是预期的JSONP格式');
                        setResult(section, '基金API响应格式不正确', false);
                    }
                } else {
                    log(section, 'API请求失败: ' + response.status + ' ' + response.statusText);
                    setResult(section, '基金API请求失败', false);
                }
            } catch (error) {
                log(section, '测试失败: ' + error.message);
                setResult(section, '基金API测试失败: ' + error.message, false);
            }
        }
        
        async function testStockApi() {
            const section = 'stock';
            logs[section] = [];
            document.getElementById(`${section}-test-log`).textContent = '';
            
            log(section, '开始测试股票API...');
            
            try {
                // 测试腾讯财经股票API
                const symbol = 'sh600519';
                const url = `http://qt.gtimg.cn/q=${symbol}`;
                
                log(section, `请求URL: ${url}`);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json, text/plain, */*',
                        'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (response.ok) {
                    const text = await response.text();
                    log(section, 'API响应成功');
                    log(section, '响应长度: ' + text.length + ' 字符');
                    
                    // 解析腾讯财经格式
                    const match = text.match(/v_sh600519="(.+)"/);
                    if (match) {
                        const values = match[1].split('~');
                        if (values.length >= 40) {
                            const name = values[1];
                            const price = values[3];
                            log(section, `解析成功: ${name} - 当前价格: ${price}`);
                            setResult(section, '股票API测试成功', true);
                        } else {
                            log(section, '数据格式不正确');
                            setResult(section, '股票API数据格式错误', false);
                        }
                    } else {
                        log(section, '响应不是预期的腾讯财经格式');
                        setResult(section, '股票API响应格式不正确', false);
                    }
                } else {
                    log(section, 'API请求失败: ' + response.status + ' ' + response.statusText);
                    setResult(section, '股票API请求失败', false);
                }
            } catch (error) {
                log(section, '测试失败: ' + error.message);
                setResult(section, '股票API测试失败: ' + error.message, false);
            }
        }
        
        function checkConsoleErrors() {
            const section = 'console';
            
            // 我们无法直接读取控制台，但可以尝试触发一个可能产生错误的请求
            log(section, '检查控制台错误...');
            log(section, '请打开浏览器开发者工具 (F12) 查看控制台');
            log(section, '应该没有 "Refused to set unsafe header" 错误');
            
            // 尝试一个可能触发错误的请求
            fetch('https://fund.eastmoney.com/pingzhongdata/005827.js', {
                headers: {
                    'User-Agent': 'Test', // 这个头在浏览器中会被拒绝
                    'Accept': 'application/json'
                }
            }).catch(e => {
                log(section, '预期中的错误（测试用）: ' + e.message);
            });
            
            setResult(section, '控制台检查完成，请查看浏览器控制台', true);
        }
    </script>
</body>
</html>
