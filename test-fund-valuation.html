<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金持仓估值测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 15px; margin: 5px; }
        .log { background: #f5f5f5; padding: 10px; margin-top: 10px; font-family: monospace; white-space: pre-wrap; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>基金持仓估值计算测试</h1>
    <p>测试昨晚可以工作但今天失败的功能</p>
    
    <div class="test">
        <h2>测试1: 直接调用基金持仓估值计算</h2>
        <button onclick="testPortfolioValuation()">测试基金005827持仓估值</button>
        <div id="test1-result"></div>
        <div id="test1-log" class="log"></div>
    </div>
    
    <div class="test">
        <h2>测试2: 测试股票数据API</h2>
        <button onclick="testStockApi()">测试股票数据获取 (600519,000858)</button>
        <div id="test2-result"></div>
        <div id="test2-log" class="log"></div>
    </div>
    
    <div class="test">
        <h2>测试3: 检查控制台错误</h2>
        <p>打开浏览器开发者工具 (F12) 查看控制台日志</p>
        <button onclick="loadAppAndTest()">加载应用并测试</button>
        <div id="test3-result"></div>
        <div id="test3-log" class="log"></div>
    </div>

    <script>
        function log(testId, message) {
            const logDiv = document.getElementById(`test${testId}-log`);
            if (logDiv) {
                logDiv.textContent += message + '\n';
            }
            console.log(`[Test${testId}]`, message);
        }
        
        function setResult(testId, message, isSuccess) {
            const resultDiv = document.getElementById(`test${testId}-result`);
            if (resultDiv) {
                resultDiv.innerHTML = `<span class="${isSuccess ? 'success' : 'error'}">${message}</span>`;
            }
        }
        
        // 测试1: 基金持仓估值计算
        async function testPortfolioValuation() {
            log(1, '开始测试基金持仓估值计算...');
            
            try {
                // 加载应用模块
                const module = await import('./dist/assets/index-DGbS4YDE.js');
                
                log(1, '应用模块加载成功');
                
                // 调用基金持仓估值计算
                const result = await module.calculateFundValuationByPortfolio('005827', 1.0);
                
                if (result) {
                    log(1, `✅ 估值计算成功:`);
                    log(1, `   基金: ${result.fundName} (${result.fundCode})`);
                    log(1, `   计算值: ${result.calculatedValue}`);
                    log(1, `   涨跌幅: ${result.calculatedChangePercent}%`);
                    log(1, `   数据源: ${result.dataSource}`);
                    log(1, `   置信度: ${result.confidence}`);
                    log(1, `   股票详情: ${result.stockDetails.length} 只`);
                    
                    setResult(1, '基金持仓估值计算成功', true);
                } else {
                    log(1, '❌ 估值计算返回null');
                    setResult(1, '估值计算失败，返回null', false);
                }
            } catch (error) {
                log(1, '❌ 测试失败: ' + error.message);
                log(1, '错误堆栈: ' + error.stack);
                setResult(1, '测试失败: ' + error.message, false);
            }
        }
        
        // 测试2: 股票数据API
        async function testStockApi() {
            log(2, '开始测试股票数据API...');
            
            try {
                // 测试腾讯财经API
                const symbols = ['600519', '000858'];
                const tencentUrl = `http://qt.gtimg.cn/q=${symbols.map(s => s.startsWith('6') ? 'sh' + s : 'sz' + s).join(',')}`;
                
                log(2, `请求URL: ${tencentUrl}`);
                
                const response = await fetch(tencentUrl, {
                    headers: {
                        'Accept': 'application/json, text/plain, */*',
                        'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8'
                    }
                });
                
                if (response.ok) {
                    const text = await response.text();
                    log(2, 'API响应成功，长度: ' + text.length + ' 字符');
                    
                    // 解析响应
                    const lines = text.split(';').filter(line => line.trim());
                    lines.forEach((line, i) => {
                        const match = line.match(/v_(sh\d+|sz\d+)="(.+)"/);
                        if (match) {
                            const symbol = match[1];
                            const values = match[2].split('~');
                            if (values.length >= 40) {
                                const name = values[1];
                                const price = values[3];
                                const changePercent = values[32];
                                log(2, `   ${symbol} - ${name}: ${price} (${changePercent}%)`);
                            }
                        }
                    });
                    
                    setResult(2, '股票API测试成功', true);
                } else {
                    log(2, 'API请求失败: ' + response.status);
                    setResult(2, 'API请求失败', false);
                }
            } catch (error) {
                log(2, '❌ 测试失败: ' + error.message);
                setResult(2, '测试失败: ' + error.message, false);
            }
        }
        
        // 测试3: 加载应用并测试
        async function loadAppAndTest() {
            log(3, '开始加载应用...');
            
            // 先加载应用
            const script = document.createElement('script');
            script.type = 'module';
            script.src = './dist/assets/index-DGbS4YDE.js';
            
            script.onload = function() {
                log(3, '✅ 应用脚本加载成功');
                log(3, '请查看控制台中的调试日志');
                setResult(3, '应用加载成功，查看控制台', true);
            };
            
            script.onerror = function() {
                log(3, '❌ 应用脚本加载失败');
                setResult(3, '应用加载失败', false);
            };
            
            document.head.appendChild(script);
        }
        
        // 页面加载时记录
        window.addEventListener('load', function() {
            console.log('基金持仓估值测试页面加载完成');
            console.log('如果看到问题，请检查：');
            console.log('1. HTTP头是否正确设置');
            console.log('2. 股票数据API是否可访问');
            console.log('3. 数据格式是否匹配');
        });
    </script>
</body>
</html>
