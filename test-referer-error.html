<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referer错误测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 15px; margin: 5px; }
        .log { background: #f5f5f5; padding: 10px; margin-top: 10px; font-family: monospace; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Referer HTTP头错误测试</h1>
    
    <div class="test">
        <h2>测试1: 直接设置Referer头（应该失败）</h2>
        <button onclick="testDirectReferer()">测试直接设置Referer</button>
        <div id="test1-result"></div>
        <div id="test1-log" class="log"></div>
    </div>
    
    <div class="test">
        <h2>测试2: 使用我们的HTTP头工具</h2>
        <button onclick="testOurHeaders()">测试我们的HTTP头工具</button>
        <div id="test2-result"></div>
        <div id="test2-log" class="log"></div>
    </div>
    
    <div class="test">
        <h2>测试3: 测试基金API调用</h2>
        <button onclick="testFundApiCall()">测试基金API</button>
        <div id="test3-result"></div>
        <div id="test3-log" class="log"></div>
    </div>
    
    <div class="test">
        <h2>测试4: 检查控制台错误</h2>
        <p>打开浏览器开发者工具 (F12) 查看控制台是否有错误</p>
        <button onclick="loadApp()">加载应用脚本</button>
        <div id="test4-result"></div>
    </div>

    <script>
        function log(testId, message) {
            const logDiv = document.getElementById(`test${testId}-log`);
            if (logDiv) {
                logDiv.textContent += message + '\n';
            }
            console.log(`[Test${testId}]`, message);
        }
        
        function setResult(testId, message, isSuccess) {
            const resultDiv = document.getElementById(`test${testId}-result`);
            if (resultDiv) {
                resultDiv.innerHTML = `<span class="${isSuccess ? 'success' : 'error'}">${message}</span>`;
            }
        }
        
        // 测试1: 直接设置Referer头（应该失败）
        async function testDirectReferer() {
            log(1, '开始测试直接设置Referer头...');
            
            try {
                const response = await fetch('https://fund.eastmoney.com/pingzhongdata/005827.js', {
                    headers: {
                        'Referer': 'https://fund.eastmoney.com/',
                        'User-Agent': 'Test'
                    }
                });
                
                log(1, '请求成功（但可能被浏览器拒绝某些头）');
                setResult(1, '请求完成，检查控制台是否有错误', true);
            } catch (error) {
                log(1, '错误: ' + error.message);
                setResult(1, '请求失败: ' + error.message, false);
            }
        }
        
        // 测试2: 模拟我们的HTTP头工具
        async function testOurHeaders() {
            log(2, '开始测试我们的HTTP头工具...');
            
            const isBrowser = typeof window !== 'undefined';
            log(2, `环境检测: ${isBrowser ? '浏览器环境' : 'Node.js环境'}`);
            
            // 模拟我们的getFundApiHeaders函数
            function getFundApiHeaders() {
                const headers = {
                    'Accept': 'application/json, text/plain, */*',
                    'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                    'Cache-Control': 'no-cache',
                    'Pragma': 'no-cache'
                };
                
                // 只在Node.js环境中设置Referer
                if (!isBrowser) {
                    headers['Referer'] = 'https://fund.eastmoney.com/';
                }
                
                return headers;
            }
            
            const headers = getFundApiHeaders();
            log(2, '生成的HTTP头: ' + JSON.stringify(headers, null, 2));
            
            // 检查是否有不安全的头
            const unsafeHeaders = ['User-Agent', 'Accept-Encoding', 'Connection', 'Referer'];
            let hasUnsafeHeader = false;
            
            for (const header of unsafeHeaders) {
                if (headers[header]) {
                    log(2, `⚠️ 包含不安全的头: ${header}`);
                    hasUnsafeHeader = true;
                }
            }
            
            if (!hasUnsafeHeader) {
                log(2, '✅ 所有HTTP头都是浏览器安全的');
                setResult(2, 'HTTP头工具工作正常', true);
            } else {
                log(2, '❌ 包含浏览器不安全的HTTP头');
                setResult(2, 'HTTP头工具可能有问题', false);
            }
        }
        
        // 测试3: 测试基金API调用
        async function testFundApiCall() {
            log(3, '开始测试基金API调用...');
            
            try {
                // 使用安全的HTTP头
                const response = await fetch('https://fundgz.1234567.com.cn/js/005827.js', {
                    headers: {
                        'Accept': 'application/json, text/plain, */*',
                        'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                        'Cache-Control': 'no-cache'
                    }
                });
                
                if (response.ok) {
                    const text = await response.text();
                    log(3, 'API调用成功，响应长度: ' + text.length + ' 字符');
                    
                    if (text.startsWith('jsonpgz(')) {
                        log(3, '✅ JSONP格式正确');
                        setResult(3, '基金API调用成功', true);
                    } else {
                        log(3, '响应格式不是预期的JSONP');
                        setResult(3, 'API响应格式异常', false);
                    }
                } else {
                    log(3, 'API请求失败: ' + response.status);
                    setResult(3, 'API请求失败', false);
                }
            } catch (error) {
                log(3, '错误: ' + error.message);
                setResult(3, 'API调用失败: ' + error.message, false);
            }
        }
        
        // 测试4: 加载应用脚本
        function loadApp() {
            log(4, '尝试加载应用脚本...');
            
            // 尝试加载构建后的JS文件
            const script = document.createElement('script');
            script.src = './dist/assets/index-C9UBTUzW.js';
            script.onload = function() {
                log(4, '应用脚本加载成功');
                setResult(4, '应用加载成功，检查控制台', true);
            };
            script.onerror = function() {
                log(4, '应用脚本加载失败');
                setResult(4, '应用加载失败', false);
            };
            
            document.head.appendChild(script);
        }
        
        // 页面加载时检查控制台
        window.addEventListener('load', function() {
            console.log('页面加载完成，开始HTTP头测试...');
            console.log('如果看到"Refused to set unsafe header"错误，说明还有问题');
        });
    </script>
</body>
</html>
