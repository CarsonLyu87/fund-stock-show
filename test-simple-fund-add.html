<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金添加简单测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        .test-result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            background: #fff;
            border: 1px solid #eee;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .loading { color: #007bff; }
        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .fund-item {
            padding: 8px;
            margin: 4px 0;
            border: 1px solid #eee;
            border-radius: 4px;
            background: white;
        }
        .fund-code {
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>基金添加简单测试</h1>
    <p>测试基金添加功能是否正常工作。</p>
    
    <div class="test-section">
        <h2>当前关注基金</h2>
        <div id="current-funds"></div>
        <button onclick="refreshFundList()">刷新列表</button>
    </div>
    
    <div class="test-section">
        <h2>测试添加基金</h2>
        <p>
            基金代码: <input type="text" id="fund-code" value="159941" placeholder="输入6位基金代码">
            <button onclick="testAddFund()">添加基金</button>
        </p>
        <div id="add-result" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试JSONP功能</h2>
        <p>测试天天基金API的JSONP调用是否正常。</p>
        <button onclick="testJsonp()">测试JSONP</button>
        <div id="jsonp-result" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>清理测试数据</h2>
        <button onclick="cleanupTestFunds()" style="background: #dc3545;">清理所有测试基金</button>
        <div id="cleanup-result" class="test-result"></div>
    </div>
    
    <script>
        const PROXY_URL = 'http://localhost:3001'
        
        function logResult(elementId, message, className = '') {
            const element = document.getElementById(elementId)
            const timestamp = new Date().toLocaleTimeString()
            element.innerHTML = `<span class="${className}">[${timestamp}] ${message}</span><br>${element.innerHTML}`
        }
        
        function clearResult(elementId) {
            document.getElementById(elementId).innerHTML = ''
        }
        
        function refreshFundList() {
            const userFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
            const container = document.getElementById('current-funds')
            
            if (userFunds.length === 0) {
                container.innerHTML = '<p style="color:#666;text-align:center;">暂无关注的基金</p>'
                return
            }
            
            container.innerHTML = userFunds.map(fund => `
                <div class="fund-item">
                    <span class="fund-code">${fund.code}</span> - ${fund.name || '未知基金'}
                    <span style="float:right;font-size:12px;color:#999;">
                        ${new Date(fund.addedAt).toLocaleTimeString()}
                    </span>
                </div>
            `).join('')
        }
        
        async function testAddFund() {
            const fundCode = document.getElementById('fund-code').value.trim()
            
            if (!/^\d{6}$/.test(fundCode)) {
                alert('请输入6位数字的基金代码')
                return
            }
            
            clearResult('add-result')
            logResult('add-result', `开始添加基金 ${fundCode}...`, 'loading')
            
            try {
                // 1. 获取基金详情
                logResult('add-result', '获取基金详情...', 'loading')
                const detailResponse = await fetch(`${PROXY_URL}/api/fund/detail/${fundCode}`)
                const detailData = await detailResponse.json()
                
                if (!detailData.success) {
                    logResult('add-result', `获取基金详情失败: ${detailData.error}`, 'error')
                    return
                }
                
                logResult('add-result', `✅ 获取基金详情成功: ${detailData.data.name}`, 'success')
                
                // 2. 添加到关注列表
                const userFunds = JSON.parse(localStorage.getItem('fund_stock_show_user_funds') || '[]')
                const exists = userFunds.some(fund => fund.code === fundCode)
                
                if (exists) {
                    logResult('add-result', `⚠️ 基金已在关注列表中`, 'success')
                } else {
                    const newFund = {
                        code: fundCode,
                        name: detailData.data.name,
                        addedAt: new Date().toISOString()
                    }
                    userFunds.push(newFund)
                    localStorage.setItem('fund_stock_show_user_funds', JSON.stringify(userFunds))
                    logResult('add-result', `✅ 成功添加到关注列表`, 'success')
                }
                
                // 3. 刷新列表
                refreshFundList()
                
                // 4. 模拟触发监控列表更新
                logResult('add-result', '🔄 触发监控列表更新...', 'loading')
                
                // 模拟App.tsx中的状态更新
                setTimeout(() => {
                    logResult('add-result', '✅ 监控列表更新已触发', 'success')
                    logResult('add-result', '💡 提示: 现在应该能在"⭐ 我的基金监控列表"中看到新添加的基金', 'success')
                }, 1000)
                
            } catch (error) {
                logResult('add-result', `❌ 添加基金失败: ${error.message}`, 'error')
            }
        }
        
        function testJsonp() {
            clearResult('jsonp-result')
            logResult('jsonp-result', '测试天天基金JSONP API...', 'loading')
            
            // 测试基金代码
            const testCode = '159941'
            const url = `https://fundgz.1234567.com.cn/js/${testCode}.js?rt=${Date.now()}`
            
            // 创建script标签
            const script = document.createElement('script')
            
            // 设置超时
            const timeoutId = setTimeout(() => {
                cleanup()
                logResult('jsonp-result', '❌ JSONP请求超时', 'error')
            }, 5000)
            
            // 清理函数
            const cleanup = () => {
                clearTimeout(timeoutId)
                if (script.parentNode) {
                    script.parentNode.removeChild(script)
                }
                // @ts-ignore
                delete window.jsonpgz
            }
            
            // 定义回调函数
            window.jsonpgz = (data) => {
                cleanup()
                if (data && data.fundcode) {
                    logResult('jsonp-result', `✅ JSONP成功: ${data.fundcode} - ${data.name}`, 'success')
                    logResult('jsonp-result', `净值: ${data.dwjz}, 涨跌幅: ${data.gszzl}%`, 'success')
                } else {
                    logResult('jsonp-result', `❌ JSONP返回数据格式错误`, 'error')
                }
            }
            
            // 设置script属性
            script.src = url
            script.onerror = () => {
                cleanup()
                logResult('jsonp-result', '❌ JSONP请求失败', 'error')
            }
            
            // 添加到文档
            document.head.appendChild(script)
        }
        
        function cleanupTestFunds() {
            clearResult('cleanup-result')
            logResult('cleanup-result', '清理所有测试基金...', 'loading')
            
            try {
                // 只保留默认基金
                const defaultFunds = [
                    { code: '005827', name: '易方达蓝筹精选混合', addedAt: new Date().toISOString() },
                    { code: '161725', name: '招商中证白酒指数', addedAt: new Date().toISOString() },
                    { code: '003095', name: '中欧医疗健康混合', addedAt: new Date().toISOString() }
                ]
                
                localStorage.setItem('fund_stock_show_user_funds', JSON.stringify(defaultFunds))
                logResult('cleanup-result', '✅ 已清理所有测试基金，恢复为默认基金', 'success')
                
                // 刷新列表
                refreshFundList()
                
            } catch (error) {
                logResult('cleanup-result', `❌ 清理失败: ${error.message}`, 'error')
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('load', () => {
            refreshFundList()
        })
    </script>
</body>
</html>
